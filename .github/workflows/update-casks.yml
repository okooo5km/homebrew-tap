name: Update Casks

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Register tap with Homebrew
        run: |
          tap_path="$(brew --repository)/Library/Taps/okooo5km/homebrew-tap"
          mkdir -p "$(dirname "$tap_path")"
          ln -s "$GITHUB_WORKSPACE" "$tap_path"

      - name: Check for outdated casks
        id: livecheck
        run: |
          brew livecheck --cask --tap okooo5km/tap --newer-only --json 2>/dev/null > /tmp/livecheck.json || echo "[]" > /tmp/livecheck.json
          cat /tmp/livecheck.json
          count=$(jq length /tmp/livecheck.json)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Update outdated casks
        if: steps.livecheck.outputs.count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          count=$(jq length /tmp/livecheck.json)
          for i in $(seq 0 $((count - 1))); do
            cask_name=$(jq -r ".[$i].cask" /tmp/livecheck.json)
            new_version=$(jq -r ".[$i].version.latest" /tmp/livecheck.json)
            cask_file="Casks/${cask_name}.rb"

            if [ ! -f "$cask_file" ]; then
              echo "::warning::Cask file not found: $cask_file"
              continue
            fi

            echo "Updating $cask_name to $new_version"

            # Extract url template from cask file and substitute version
            url_template=$(grep -m1 'url "' "$cask_file" | sed 's/.*url "\(.*\)"/\1/' | sed "s/#{version}/$new_version/g")

            echo "Downloading: $url_template"
            curl -L -o /tmp/download.dmg "$url_template"
            new_sha256=$(shasum -a 256 /tmp/download.dmg | awk '{print $1}')
            rm -f /tmp/download.dmg
            echo "SHA256: $new_sha256"

            # Update version and sha256 in cask file
            sed -i '' "s/version \".*\"/version \"$new_version\"/" "$cask_file"
            sed -i '' "s/sha256 \".*\"/sha256 \"$new_sha256\"/" "$cask_file"

            echo "Updated $cask_file:"
            cat "$cask_file"

            git add "$cask_file"
            git commit -m "Update $cask_name to $new_version"
          done

          git push
